project:
  type: website
  output-dir: _site

website:
  title: Maths Sheets
  repo-url: https://github.com/matthewhillary/maths-sheets
  repo-actions: [source]
  page-footer: 
    left: 
      - text: "← Back to Home"
        href: index.qmd

format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    number-sections: false
  pdf:
    documentclass: article
    papersize: a4
    number-sections: false
    colorlinks: true
    engine: typst

    
html-math-method:
  method: mathjax
  url: https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
